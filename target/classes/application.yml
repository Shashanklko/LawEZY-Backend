server:
  port: 8080

spring:
  application:
    name: LawEZY-Backend

  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/lawezy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password # TODO: Change to your local MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Configurations
  jpa:
    hibernate:
      ddl-auto: update # Great for initial dev. Change to validate/none for prod.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  # MongoDB Configuration
  data:
    mongodb:
      uri: mongodb://localhost:27017/lawezy_chat

# Custom JWT Application Properties
jwt:
  secret: your-256-bit-secret-your-256-bit-secret-your-256-bit-secret # TODO: use a secure generated secret in prod
  expirationMs: 86400000 # 24 hours
